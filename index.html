<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>比對現場補料單</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="mobile-header">
    <div class="brand compact">
      <div class="brand-mark">昱</div>
      <div>
        <h1>比對現場補料單</h1>
      </div>
    </div>
    <div class="mobile-header-actions">
      <span id="mobilePermissionBadge" class="badge pending">待開通</span>
      <button id="mobileMenuBtn" class="mobile-menu-btn" type="button" aria-label="開啟選單" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <nav id="mobileMenu" class="mobile-menu hidden" aria-label="手機選單">
    <a class="mobile-menu-item active" href="index.html">掃描核對</a>
    <a class="mobile-menu-item" href="admin.html">管理頁面</a>
  </nav>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">昱</div>
        <div>
          <h1>比對現場補料單</h1>
        </div>
      </div>

      <nav class="nav-list" aria-label="工具導覽">
        <button class="nav-item active" type="button">掃描核對</button>
        <a class="nav-item" href="admin.html">管理頁面</a>
      </nav>

      <section class="status-panel">
        <span class="status-label">操作人</span>
        <strong id="operatorName">LINE 使用者</strong>
        <span id="operatorId" class="muted">等待 LIFF 識別</span>
        <span id="permissionBadge" class="badge pending">待開通</span>
      </section>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <h2>比對現場補料單</h2>
        </div>
      </header>

      <section class="scan-grid">
        <div class="upload-panel">
          <div class="section-title">
            <h3>上傳圖片</h3>
          </div>

          <div class="upload-choice-grid">
            <label id="dropZone" class="drop-zone">
              <input id="cameraInput" type="file" accept="image/*" capture="environment">
              <span class="drop-icon">＋</span>
              <strong>拍照上傳</strong>
              <small>直接開啟手機相機</small>
            </label>

            <label class="drop-zone secondary-upload">
              <input id="fileInput" type="file" accept="image/*">
              <span class="drop-icon">檔</span>
              <strong>選擇檔案</strong>
              <small>可從相簿或檔案上傳 JPG、PNG、HEIC</small>
            </label>
          </div>

          <div id="previewShell" class="preview-shell empty">
            <img id="imagePreview" alt="補料單預覽">
            <span>尚未選擇圖片</span>
          </div>

          <button id="inlineMobileRunOcrBtn" class="primary-btn inline-mobile-action" type="button" disabled>執行 OCR 核對</button>
          <button id="runOcrBtn" class="primary-btn desktop-action" type="button" disabled>執行 OCR 核對</button>
        </div>

        <div class="summary-panel">
          <div class="section-title">
            <h3>本次結果</h3>
          </div>

          <div class="metric-grid">
            <div class="metric">
              <span>總筆數</span>
              <strong id="totalCount">0</strong>
            </div>
            <div class="metric ok">
              <span>通過</span>
              <strong id="passedCount">0</strong>
            </div>
            <div class="metric danger">
              <span>異常</span>
              <strong id="abnormalCount">0</strong>
            </div>
          </div>

          <dl class="detail-list">
            <div>
              <dt>製令單號</dt>
              <dd id="orderNo">未判讀</dd>
            </div>
            <div>
              <dt>批次狀態</dt>
              <dd id="batchStatus">尚未開始</dd>
            </div>
          </dl>
        </div>
      </section>

      <section class="result-panel">
        <div class="section-title">
          <h3>核對明細</h3>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>狀態</th>
                <th>品號</th>
                <th>規格</th>
                <th>不良</th>
                <th>需領</th>
                <th>實領</th>
                <th>備註</th>
              </tr>
            </thead>
            <tbody id="resultBody">
              <tr class="empty-row">
                <td colspan="7">等待 OCR 結果</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="mobile-action-bar">
    <button id="mobileRunOcrBtn" class="primary-btn" type="button" disabled>執行 OCR 並寫入</button>
  </div>

  <div id="processingModal" class="processing-modal hidden" role="alertdialog" aria-live="assertive" aria-modal="true">
    <div class="processing-card">
      <div class="processing-spinner" aria-hidden="true"></div>
      <strong>OCR 核對中</strong>
      <p>請勿關閉頁面，請稍後。</p>
      <small>系統正在辨識圖片、比對主檔並寫入紀錄。</small>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="app.js"></script>
</body>
</html>
